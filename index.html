<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesignOS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --acc:#5B4CF5;--acc-l:#EEEDfe;--acc-m:#7F77DD;
  --bg0:#fff;--bg1:#f8f8f7;--bg2:#f2f1ee;
  --t1:#1a1a18;--t2:#6b6b67;--t3:#9e9e99;
  --b1:rgba(0,0,0,.28);--b2:rgba(0,0,0,.16);--b3:rgba(0,0,0,.09);
  --r8:8px;--r12:12px;--r16:16px;
  --danger:#A32D2D;--success:#1D9E75;--warn:#854F0B;
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --bg0:#1c1c1a;--bg1:#252523;--bg2:#2e2e2b;
  --t1:#f0efe8;--t2:#a8a8a0;--t3:#6e6e68;
  --b1:rgba(255,255,255,.24);--b2:rgba(255,255,255,.14);--b3:rgba(255,255,255,.08);
  --danger:#F09595;
}}
html,body{height:100%;font-family:var(--font);font-size:13px;color:var(--t1);background:var(--bg0)}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:196px;border-right:.5px solid var(--b3);padding:12px 0;display:flex;flex-direction:column;gap:1px;background:var(--bg1);flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.tb{border-bottom:.5px solid var(--b3);padding:10px 18px;display:flex;align-items:center;gap:9px;background:var(--bg0);flex-shrink:0}
.content{flex:1;padding:18px 22px;overflow-y:auto}

/* SIDEBAR */
.sb-logo{padding:0 14px 12px;font-weight:700;font-size:15px;border-bottom:.5px solid var(--b3);margin-bottom:6px;display:flex;align-items:center;gap:9px}
.ldot{width:22px;height:22px;border-radius:7px;background:var(--acc);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}
.ns{padding:0 10px;font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.08em;margin:10px 0 2px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-radius:var(--r8);margin:0 6px;color:var(--t2);font-size:13px;transition:background .12s;user-select:none}
.ni:hover{background:var(--bg0);color:var(--t1)}
.ni.act{background:var(--bg0);color:var(--acc);font-weight:600}
.nic{font-size:14px;width:17px;text-align:center}
.bdg{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:8px;background:var(--acc-l);color:var(--acc);font-weight:600}

/* TOPBAR */
.tb-left{flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.tb-title{font-weight:700;font-size:15px;white-space:nowrap}
.bc-sep{color:var(--t3);font-size:12px}
.bc-link{font-size:12px;color:var(--acc);cursor:pointer}
.bc-link:hover{text-decoration:underline}
.bc-cur{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* BUTTONS */
.btn{padding:5px 12px;border-radius:var(--r8);border:.5px solid var(--b2);background:transparent;cursor:pointer;font-size:12px;color:var(--t1);font-family:var(--font);transition:background .1s}
.btn:hover{background:var(--bg1)}
.btn.pri{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn.pri:hover{background:#4a3dd4}
.btn.xs{padding:3px 9px;font-size:11px}
.btn.danger{color:var(--danger);border-color:transparent}
.btn.danger:hover{background:#fee2e2}

/* PILLS */
.pill{font-size:10px;padding:2px 7px;border-radius:7px;font-weight:500}
.sp{background:#EEEDfe;color:#534AB7}
.sr{background:#FAEEDA;color:#854F0B}
.sd{background:#EAF3DE;color:#3B6D11}
.sl{background:#E6F1FB;color:#185FA5}
.sg{background:#F3E8FF;color:#7C3AED}
.sdt{background:#FEF9C3;color:#854D0E}

/* FORMS */
.fi,.fs,.ta{width:100%;padding:7px 10px;border:.5px solid var(--b2);border-radius:var(--r8);background:var(--bg1);color:var(--t1);font-size:13px;font-family:var(--font)}
.fi-sm{flex:1;padding:6px 9px;border:.5px solid var(--b2);border-radius:var(--r8);background:var(--bg1);color:var(--t1);font-size:12px;font-family:var(--font)}
.fi-due{width:80px;padding:6px 9px;border:.5px solid var(--b2);border-radius:var(--r8);background:var(--bg1);color:var(--t1);font-size:12px;font-family:var(--font)}
.ta{resize:vertical}
.re-wrap{border:.5px solid var(--b2);border-radius:var(--r8);background:var(--bg1);overflow:hidden}
.re-wrap:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px rgba(91,76,245,.12)}
.re-toolbar{display:flex;align-items:center;gap:1px;padding:5px 8px;border-bottom:.5px solid var(--b3);background:var(--bg0);flex-wrap:wrap}
.re-btn{min-width:28px;height:26px;border:none;background:transparent;border-radius:5px;cursor:pointer;font-size:12px;color:var(--t2);display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:var(--font);transition:background .1s;flex-shrink:0}
.re-btn:hover{background:var(--bg1);color:var(--t1)}
.re-sep{width:.5px;height:18px;background:var(--b3);margin:0 4px;flex-shrink:0}
.re-body{min-height:180px;padding:12px 14px;outline:none;font-size:13px;color:var(--t1);line-height:1.7;font-family:var(--font)}
.re-body:empty::before{content:attr(data-ph);color:var(--t3);pointer-events:none}
.re-body h1{font-size:20px;font-weight:700;margin:8px 0 4px}
.re-body h2{font-size:16px;font-weight:700;margin:6px 0 3px}
.re-body h3{font-size:14px;font-weight:600;margin:4px 0 2px}
.re-body ul,.re-body ol{padding-left:20px;margin:4px 0}
.re-body li{margin:2px 0}
.re-body blockquote{border-left:3px solid var(--acc-m);margin:6px 0;padding:4px 12px;color:var(--t2);background:var(--acc-l);border-radius:0 4px 4px 0}
.re-body code{background:var(--bg2);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:12px}
.re-body a{color:var(--acc)}
.re-img-grid{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0}
.re-img-card{position:relative;border-radius:var(--r8);overflow:hidden;border:.5px solid var(--b3);display:inline-block}
.re-img-card img{display:block;max-width:280px;max-height:200px;object-fit:cover;cursor:zoom-in}
.re-img-del{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s}
.re-img-card:hover .re-img-del{opacity:1}
.re-img-full{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:200;cursor:zoom-out}
.re-img-full img{max-width:90vw;max-height:90vh;border-radius:var(--r12)}
.fg{margin-bottom:10px}
.fl{font-size:11px;color:var(--t2);margin-bottom:4px;display:block;font-weight:500}
.fi:focus,.fi-sm:focus,.fi-due:focus,.ta:focus,.fs:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(91,76,245,.12)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* PROJECT TABS */
.proj-tabs{display:flex;border-bottom:.5px solid var(--b3);margin-bottom:20px;overflow-x:auto;flex-shrink:0;position:relative}
.ptab{padding:9px 16px;cursor:pointer;font-size:13px;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-0.5px;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:7px;position:relative}
.ptab:hover{color:var(--t1)}
.ptab.act{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.ptab-dot{width:8px;height:8px;border-radius:50%}
.ptab-del{display:none;margin-left:4px;width:14px;height:14px;border-radius:3px;background:rgba(163,45,45,.12);color:#A32D2D;font-size:9px;align-items:center;justify-content:center;cursor:pointer}
.ptab:hover .ptab-del{display:flex}
.ptab-add{padding:9px 12px;cursor:pointer;font-size:12px;color:var(--acc);border-bottom:2px solid transparent;margin-bottom:-0.5px;flex-shrink:0}
.ptab-add:hover{background:var(--acc-l);border-radius:8px 8px 0 0}

/* QUARTER / ROADMAP */
.q-section{margin-bottom:26px}
.q-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:7px;border-bottom:.5px solid var(--b3)}
.q-title{font-weight:700;font-size:14px;color:var(--t1);letter-spacing:.02em}
.rm-card{background:var(--bg0);border:.5px solid var(--b3);border-radius:var(--r16);margin-bottom:12px;overflow:hidden;transition:all .18s}
.rm-card:hover{border-color:var(--acc-m);box-shadow:0 2px 12px rgba(91,76,245,.08)}
.rm-card-hd{display:flex;align-items:flex-start;gap:14px;padding:18px 20px;cursor:pointer;user-select:none}
.rm-icon{width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:1px;background:var(--acc-l);display:flex;align-items:center;justify-content:center}
.rm-name{font-weight:700;font-size:16px;flex:1;min-width:0;line-height:1.35}
.rm-badges{display:flex;gap:5px;align-items:center;flex-shrink:0}
.cnt{font-size:10px;padding:1px 6px;border-radius:6px;color:var(--t3)}
.cnt.has{background:var(--acc-l);color:var(--acc)}
.rm-open-btn{font-size:12px;color:var(--acc);cursor:pointer;flex-shrink:0;padding:3px 7px;border-radius:5px;transition:background .1s;border:.5px solid transparent}
.rm-open-btn:hover{background:var(--acc-l);border-color:var(--acc)}
.rm-edit-btn{font-size:11px;color:var(--t3);cursor:pointer;flex-shrink:0;padding:3px 7px;border-radius:5px;transition:all .1s;border:.5px solid transparent}
.rm-edit-btn:hover{background:var(--bg1);border-color:var(--b2);color:var(--t1)}
.rm-del-btn{font-size:11px;color:#A32D2D;cursor:pointer;flex-shrink:0;padding:3px 7px;border-radius:5px;transition:all .1s;border:.5px solid transparent;opacity:0}
.rm-card:hover .rm-del-btn{opacity:1}
.rm-del-btn:hover{background:#fee2e2;border-color:#fca5a5}
.rm-chev{font-size:10px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.rm-chev.open{transform:rotate(90deg)}

/* CARD BODY */
.rm-body{border-top:.5px solid var(--b3)}
.rm-sec{padding:12px 16px;border-bottom:.5px solid var(--b3)}
.rm-sec:last-child{border-bottom:none}
.rm-sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.rm-sec-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}

/* TASKS */
.task-row{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:.5px solid var(--b3)}
.task-row:last-child{border-bottom:none;padding-bottom:0}
.cb{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--b2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:all .15s}
.cb.dn{background:#639922;border-color:#639922;color:#fff}

/* NOTES */
.note-chip{background:var(--bg1);border-radius:var(--r8);padding:9px 12px;margin-bottom:6px;cursor:pointer;border-left:2px solid var(--acc-m);transition:background .1s}
.note-chip:hover{background:var(--acc-l)}
.note-chip-title{font-weight:600;font-size:13px;margin-bottom:2px}
.note-chip-body{font-size:12px;color:var(--t2);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.note-tag{font-size:10px;padding:1px 6px;border-radius:5px;background:#E6F1FB;color:#185FA5;margin-top:4px;display:inline-block}

/* ATTACHMENTS */
.att-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.att-chip{display:flex;align-items:center;gap:6px;padding:4px 9px;border-radius:var(--r8);border:.5px solid var(--b3);background:var(--bg0);font-size:11px;cursor:pointer;max-width:200px;transition:border-color .15s}
.att-chip:hover{border-color:var(--b2)}
.att-icon{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;font-weight:700}
.ai-img{background:#EEEDfe;color:#534AB7}.ai-pdf{background:#FCEBEB;color:#A32D2D}
.ai-fig{background:#E1F5EE;color:#0F6E56}.ai-link{background:#FAEEDA;color:#854F0B}.ai-file{background:#E6F1FB;color:#185FA5}
.att-name{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.att-del{margin-left:auto;font-size:11px;color:var(--t3);cursor:pointer;padding-left:4px;flex-shrink:0}
.att-del:hover{color:#A32D2D}
.att-toolbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.att-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r8);border:.5px solid var(--b3);background:var(--bg0);font-size:12px;cursor:pointer;color:var(--t2);font-family:var(--font);transition:all .15s}
.att-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-l)}
.link-row{display:flex;gap:6px;margin-bottom:7px;align-items:center}

/* DETAIL */
.td-section{margin-bottom:22px}
.td-sec-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.kpi-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:.5px solid var(--b3)}
.kpi-row:last-child{border-bottom:none;padding-bottom:0}
.inline-area{background:var(--bg1);border-radius:var(--r12);padding:13px;margin-top:8px}

/* MODAL */
.mo-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:flex-start;justify-content:center;padding:60px 20px;z-index:100;backdrop-filter:blur(2px)}
.mo-overlay.open{display:flex}
.mo-box{background:var(--bg0);border-radius:var(--r16);border:.5px solid var(--b2);padding:26px;width:700px;max-width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo-title{font-weight:700;font-size:17px;margin-bottom:18px}
.mo-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:.5px solid var(--b3)}

/* DASHBOARD */
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:22px}
.stat-card{background:var(--bg1);border-radius:var(--r12);padding:16px;cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.stat-card:hover{border-color:var(--acc-m)}
.stat-label{font-size:11px;color:var(--t3);margin-bottom:5px}
.stat-val{font-size:26px;font-weight:700}
.stat-sub{font-size:11px;color:var(--acc);margin-top:5px}

/* TASKS VIEW */
.task-filter{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tfil{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:.5px solid var(--b2);color:var(--t2);transition:all .15s}
.tfil:hover{border-color:var(--acc);color:var(--acc)}
.tfil.act{background:var(--acc);color:#fff;border-color:var(--acc)}
.task-group{margin-bottom:20px}
.task-group-hd{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:6px;border-bottom:.5px solid var(--b3);display:flex;align-items:center;justify-content:space-between}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--bg0);border:.5px solid var(--b3);border-radius:var(--r8);margin-bottom:5px;transition:border-color .15s}
.task-item:hover{border-color:var(--b2)}
.task-meta{font-size:11px;color:var(--t3);margin-top:2px;display:flex;gap:8px}
.task-proj-tag{font-size:10px;padding:1px 6px;border-radius:5px}

/* NOTES TIMELINE */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1px;background:var(--b3)}
.tl-day{margin-bottom:24px}
.tl-day-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-left:20px;position:relative}
.tl-day-label::before{content:'';position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:var(--acc);border:2px solid var(--bg0)}
.tl-note{background:var(--bg0);border:.5px solid var(--b3);border-radius:var(--r12);padding:13px 15px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.tl-note:hover{border-color:var(--b2)}
.tl-note-title{font-weight:600;font-size:13px;margin-bottom:4px}
.tl-note-body{font-size:12px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tl-note-foot{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap}
.tl-badge{font-size:10px;padding:2px 7px;border-radius:5px}
.tl-meeting{background:#FAEEDA;color:#854F0B}
.tl-roadmap{background:#EEEDfe;color:#534AB7}
.tl-free{background:#EAF3DE;color:#3B6D11}

/* MEETINGS */
.meeting-card{background:var(--bg0);border:.5px solid var(--b3);border-radius:var(--r12);padding:14px 16px;margin-bottom:8px;transition:border-color .15s}
.meeting-card:hover{border-color:var(--b2)}
.meeting-hd{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.meeting-time{font-size:11px;color:var(--t3);font-family:var(--mono)}
.meeting-title{font-weight:600;font-size:14px;flex:1}
.meeting-type{font-size:10px;padding:2px 7px;border-radius:5px}
.mt-design{background:#EEEDfe;color:#534AB7}
.mt-team{background:#EAF3DE;color:#3B6D11}
.mt-client{background:#FAEEDA;color:#854F0B}
.meeting-notes{font-size:12px;color:var(--t2);margin-top:6px}

/* MISC */
.empty{font-size:13px;color:var(--t3);padding:30px 0;text-align:center}
.sep{height:.5px;background:var(--b3);margin:16px 0}
.view-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.view-title{font-size:18px;font-weight:700}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen" style="display:none;position:fixed;inset:0;z-index:999;background:var(--bg0);align-items:center;justify-content:center;flex-direction:column">
  <div style="width:380px;padding:40px 36px;background:var(--bg1);border-radius:24px;border:.5px solid var(--b2);box-shadow:0 24px 80px rgba(0,0,0,.18);text-align:center">
    <div style="width:56px;height:56px;border-radius:16px;background:var(--acc);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:22px;font-weight:700;color:#fff">D</div>
    <div style="font-weight:700;font-size:22px;margin-bottom:6px">DesignOS</div>
    <div style="font-size:13px;color:var(--t3);margin-bottom:28px">Wprowadź hasło aby kontynuować</div>
    <input id="lock-input" type="password" placeholder="Hasło..." style="width:100%;padding:13px 16px;border:1.5px solid var(--b2);border-radius:12px;background:var(--bg0);color:var(--t1);font-size:16px;font-family:var(--font);text-align:center;letter-spacing:5px;margin-bottom:8px;outline:none" onkeydown="if(event.key==='Enter')tryUnlock()" onfocus="this.style.borderColor='var(--acc)'" onblur="this.style.borderColor='var(--b2)'">
    <div id="lock-err" style="font-size:12px;color:#A32D2D;min-height:18px;margin-bottom:10px"></div>
    <button onclick="tryUnlock()" style="width:100%;padding:13px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);margin-bottom:4px">Wejdź →</button>
    <div style="margin-top:20px;padding-top:20px;border-top:.5px solid var(--b3);display:flex;flex-direction:column;gap:10px">
      <button onclick="showSetPassword()" style="font-size:12px;color:var(--acc);background:none;border:none;cursor:pointer;font-family:var(--font)">Ustaw / zmień hasło</button>
      <button onclick="emergencyReset()" style="font-size:12px;color:var(--t3);background:none;border:none;cursor:pointer;font-family:var(--font)">Nie pamiętam hasła — wejdź bez hasła</button>
    </div>
  </div>
</div>

<!-- SET PASSWORD MODAL -->
<div id="setpw-screen" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);align-items:center;justify-content:center;backdrop-filter:blur(3px)">
  <div style="width:360px;padding:32px;background:var(--bg0);border-radius:20px;border:.5px solid var(--b2);box-shadow:0 24px 80px rgba(0,0,0,.2)">
    <div style="font-weight:700;font-size:17px;margin-bottom:6px">Ustaw hasło</div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:20px">Hasło będzie zapisane w Twojej przeglądarce.</div>
    <div style="margin-bottom:12px">
      <label style="font-size:11px;font-weight:500;color:var(--t2);display:block;margin-bottom:5px">Nowe hasło</label>
      <input id="pw-new" type="password" placeholder="Wpisz hasło..." style="width:100%;padding:10px 12px;border:.5px solid var(--b2);border-radius:9px;background:var(--bg1);color:var(--t1);font-size:14px;font-family:var(--font)">
    </div>
    <div style="margin-bottom:16px">
      <label style="font-size:11px;font-weight:500;color:var(--t2);display:block;margin-bottom:5px">Powtórz hasło</label>
      <input id="pw-rep" type="password" placeholder="Powtórz hasło..." style="width:100%;padding:10px 12px;border:.5px solid var(--b2);border-radius:9px;background:var(--bg1);color:var(--t1);font-size:14px;font-family:var(--font)" onkeydown="if(event.key==='Enter')savePassword()">
    </div>
    <div id="pw-err" style="font-size:12px;color:#A32D2D;min-height:18px;margin-bottom:10px"></div>
    <div style="display:flex;gap:8px">
      <button onclick="closeSetPassword()" style="flex:1;padding:10px;background:none;border:.5px solid var(--b2);border-radius:9px;font-size:13px;cursor:pointer;font-family:var(--font);color:var(--t1)">Anuluj</button>
      <button onclick="savePassword()" style="flex:1;padding:10px;background:var(--acc);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)">Zapisz hasło</button>
    </div>
  </div>
</div>

<div class="app" id="main-app" style="display:none">
  <div class="sb">
    <div class="sb-logo"><span class="ldot">D</span>DesignOS</div>
    <span class="ns">Workspace</span>
    <div class="ni" id="nav-dashboard" onclick="goView('dashboard')"><span class="nic">◈</span>Dashboard</div>
    <div class="ni" id="nav-projects" onclick="goView('projects')"><span class="nic">◫</span>Projekty</div>
    <div class="ni" id="nav-tasks" onclick="goView('tasks')"><span class="nic">✓</span>Zadania<span class="bdg" id="b-t">0</span></div>
    <span class="ns">Planowanie</span>
    <div class="ni act" id="nav-roadmap" onclick="goView('roadmap')"><span class="nic">→</span>Roadmapa</div>
    <div class="ni" id="nav-meetings" onclick="goView('meetings')"><span class="nic">◷</span>Spotkania</div>
    <span class="ns">Wiedza</span>
    <div class="ni" id="nav-notes" onclick="goView('notes')"><span class="nic">◻</span>Notatki</div>
    <div style="flex:1"></div>
    <div style="padding:10px 12px;border-top:.5px solid var(--b3);display:flex;flex-direction:column;gap:5px">
      <button class="btn xs" style="width:100%;justify-content:center;display:flex;align-items:center;gap:5px;margin-bottom:3px" onclick="showChangePassword()">🔒 Zmień hasło</button>
      <button class="btn xs" style="width:100%;justify-content:center;display:flex;align-items:center;gap:5px;margin-bottom:3px" onclick="lockApp()">🚪 Zablokuj</button>
      <button class="btn xs" style="width:100%;justify-content:center;display:flex;align-items:center;gap:5px" onclick="exportData()">⬇ Eksportuj dane</button>
      <label class="btn xs" style="width:100%;justify-content:center;display:flex;align-items:center;gap:5px;cursor:pointer;margin:0">⬆ Importuj dane<input type="file" accept=".json" style="display:none" onchange="importData(this)"></label>
    </div>
  </div>
  <div class="main">
    <div class="tb">
      <div class="tb-left" id="tb-left"><span class="tb-title">Roadmapa</span></div>
      <div id="tb-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="mo-overlay" id="mo">
  <div class="mo-box">
    <div class="mo-title" id="mo-title"></div>
    <div id="mo-body"></div>
    <div class="mo-acts">
      <button class="btn" onclick="closeMo()">Anuluj</button>
      <button class="btn pri" id="mo-save" onclick="saveMo()">Zapisz</button>
    </div>
  </div>
</div>

<script>
// ───────────────────────── STATUS CONFIG ─────────────────────────
// STATUS label map — key: internal value, val: display label
const SL={
  progress:'W toku',
  review:'Review',
  planning:'Planowanie',
  done:'Ukończony',
  designs:'Gotowe designy',
  discuss:'Do przegadania z zespołem'
};
// STATUS css class map
const SC={
  progress:'sp',
  review:'sr',
  planning:'sl',
  done:'sd',
  designs:'sg',
  discuss:'sdt'
};

// All available quarters
const QUARTERS=['Q1 2025','Q2 2025','Q3 2025','Q4 2025','Q1 2026','Q2 2026','Q3 2026','Q4 2026'];

function defState(){return{
  projects:[
    {id:'p1',name:'Design System',color:'#5B4CF5'},
    {id:'p2',name:'Mobile App 3.0',color:'#EF9F27'},
    {id:'p3',name:'Growth Platform',color:'#1D9E75'},
  ],
  items:[
    {id:'i1',pid:'p1',q:'Q2 2025',name:'Tokenizacja — warstwa semantyczna',status:'progress',myDesc:'',
      poDesc:'Celem jest stworzenie spójnej warstwy tokenów semantycznych, które będą jedynym źródłem prawdy dla wszystkich wartości designerskich.',
      kpis:[
        {id:'k1',name:'Pokrycie komponentów tokenami',target:'100%',current:'42%',links:[]},
        {id:'k2',name:'Czas wdrożenia nowego motywu',target:'< 1 dzień',current:'~4 dni',links:[]},
      ],
      tasks:[
        {id:'t1',text:'Zdefiniować tokeny koloru semantycznego',done:false,due:'15 kwi'},
        {id:'t2',text:'Zaktualizować Figma library',done:true,due:'8 kwi'},
        {id:'t3',text:'Dokumentacja tokenów dla dev-ów',done:false,due:'22 kwi'},
      ],
      notes:[{id:'n1',title:'Decyzja: semantyczne przed globalnymi',body:'Zaczniemy od warstwy semantycznej.',date:'8 kwi 2025',type:'roadmap',meetingId:'',atts:[]}],
      atts:[],
    },
    {id:'i2',pid:'p1',q:'Q2 2025',name:'Komponenty — stany i dostępność',status:'planning',myDesc:'',
      poDesc:'Wszystkie komponenty muszą mieć w pełni zaprojektowane stany. WCAG 2.2 AA jest warunkiem koniecznym.',
      kpis:[{id:'k3',name:'Komponenty ze wszystkimi stanami',target:'100%',current:'28%',links:[]}],
      tasks:[{id:'t4',text:'Audit istniejących komponentów',done:false,due:'20 kwi'}],
      notes:[],atts:[],
    },
    {id:'i3',pid:'p2',q:'Q2 2025',name:'User research — nowi użytkownicy',status:'progress',myDesc:'',
      poDesc:'Zbadanie ścieżki nowych użytkowników — od pierwszego uruchomienia do onboarding completion.',
      kpis:[
        {id:'k5',name:'Onboarding completion rate',target:'>65%',current:'38%',links:[]},
        {id:'k6',name:'Time-to-first-value',target:'< 3 min',current:'7 min',links:[]},
      ],
      tasks:[
        {id:'t6',text:'Przeprowadzić 8 sesji user testing',done:false,due:'18 kwi'},
        {id:'t7',text:'Synthesis workshop z teamem',done:false,due:'22 kwi'},
      ],
      notes:[],atts:[],
    },
    {id:'i4',pid:'p3',q:'Q2 2025',name:'Dashboard analityczny — redesign',status:'review',myDesc:'',
      poDesc:'Nowy dashboard musi pokazywać dane w sposób zrozumiały dla nie-technicznych użytkowników.',
      kpis:[
        {id:'k9',name:'Czas do znalezienia kluczowej metryki',target:'< 10 sek',current:'34 sek',links:[]},
        {id:'k10',name:'NPS dashboardu',target:'>50',current:'22',links:[]},
      ],
      tasks:[
        {id:'t11',text:'Zaprojektować nową hierarchię informacji',done:true,due:'5 kwi'},
        {id:'t12',text:'Prototyp do testów',done:true,due:'7 kwi'},
        {id:'t13',text:'Testy z 5 użytkownikami',done:false,due:'14 kwi'},
      ],
      notes:[],atts:[],
    },
  ],
  meetings:[
    {id:'m1',title:'Design System weekly',date:'8 kwi 2025',time:'10:00',type:'team',attendees:'Kasia, Tomek, Anna',notes:'Omówiono kierunek tokenizacji.'},
    {id:'m2',title:'Prezentacja dla klienta — Growth',date:'10 kwi 2025',time:'14:00',type:'client',attendees:'CEO, PM, Designer',notes:''},
  ],
  allNotes:[
    {id:'gn1',title:'Decyzja: semantyczne przed globalnymi',body:'Zaczniemy od warstwy semantycznej.',date:'8 kwi 2025',type:'roadmap',meetingId:'',itemId:'i1',atts:[]},
    {id:'gn2',title:'Notatka ze spotkania Design System',body:'Tokenizacja priorytetu. Kolejne kroki: warstwa semantyczna do 22 kwi.',date:'8 kwi 2025',type:'meeting',meetingId:'m1',itemId:'',atts:[]},
  ],
  curProj:'p1',
};}

function loadState(){try{const s=localStorage.getItem('dos2');if(s)return JSON.parse(s);}catch(e){}return null;}
function persist(){try{localStorage.setItem('dos2',JSON.stringify({projects:S.projects,items:S.items,meetings:S.meetings,allNotes:S.allNotes,curProj:S.curProj}));}catch(e){}}

const saved=loadState();
const S={...(saved||defState()),expanded:{},curView:'roadmap',moMode:'',kpiPendingLinks:{},taskFilter:'all',noteEditMode:null};
if(!saved){S.curProj='p1';}

// ───────────────────────── UTILS ─────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function updateBadges(){document.getElementById('b-t').textContent=S.items.reduce((a,i)=>a+i.tasks.filter(t=>!t.done).length,0)}
function $(id){return document.getElementById(id)}

// ───────────────────────── ROUTING ─────────────────────────
function goView(v,opts){
  S.curView=v;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('act'));
  $('nav-'+v)?.classList.add('act');
  setBc(null);setTbActions(v);
  const c=$('content');
  if(v==='roadmap')renderRoadmap(c);
  else if(v==='dashboard')renderDashboard(c);
  else if(v==='tasks')renderTasks(c);
  else if(v==='notes')renderNotes(c);
  else if(v==='meetings')renderMeetings(c);
  else if(v==='projects')renderProjectsView(c);
}
function goDetail(view,opts){
  const c=$('content');
  if(view==='task-detail'){setBc([{label:'Roadmapa',fn:"goView('roadmap')"},{label:opts.name||''}]);setTbActions('');renderTaskDetail(c,opts.id);}
  else if(view==='note-detail'){
    setBc([{label:'Notatki',fn:"goView('notes')"},{label:opts.title||''}]);setTbActions('');renderNoteDetail(c,opts.id);
  }
  else if(view==='meeting-detail'){setBc([{label:'Spotkania',fn:"goView('meetings')"},{label:opts.title||''}]);setTbActions('');renderMeetingDetail(c,opts.id);}
}
function setBc(parts){
  const el=$('tb-left');
  if(!parts){el.innerHTML=`<span class="tb-title">${viewTitle(S.curView)}</span>`;return;}
  el.innerHTML=parts.map((p,i)=>i<parts.length-1
    ?`<span class="bc-link" onclick="${p.fn}">${p.label}</span><span class="bc-sep">›</span>`
    :`<span class="bc-cur">${p.label}</span>`).join('');
}
function viewTitle(v){return{roadmap:'Roadmapa',dashboard:'Dashboard',tasks:'Zadania',notes:'Notatki',meetings:'Spotkania',projects:'Projekty'}[v]||'DesignOS'}
function setTbActions(v){
  const el=$('tb-actions');
  if(v==='roadmap')el.innerHTML=`<button class="btn xs" onclick="openAddProject()">+ Projekt</button>&nbsp;<button class="btn xs pri" onclick="openAddItem()">+ Task</button>`;
  else if(v==='tasks')el.innerHTML=`<button class="btn xs pri" onclick="openAddGlobalTask()">+ Zadanie</button>`;
  else if(v==='notes')el.innerHTML=`<button class="btn xs pri" onclick="openAddNote()">+ Notatka</button>`;
  else if(v==='meetings')el.innerHTML=`<button class="btn xs pri" onclick="openAddMeeting()">+ Spotkanie</button>`;
  else el.innerHTML='';
}

// ───────────────────────── DASHBOARD ─────────────────────────
function renderDashboard(c){
  const totalTasks=S.items.reduce((a,i)=>a+i.tasks.length,0);
  const doneTasks=S.items.reduce((a,i)=>a+i.tasks.filter(t=>t.done).length,0);
  const openTasks=totalTasks-doneTasks;
  const inProgress=S.items.filter(i=>i.status==='progress').length;
  const totalNotes=S.allNotes.length;
  const recentItems=[...S.items].reverse().slice(0,3);
  c.innerHTML=`
    <div class="view-header"><div class="view-title">Dzień dobry 👋</div><span style="font-size:12px;color:var(--t3)">${new Date().toLocaleDateString('pl',{weekday:'long',day:'numeric',month:'long'})}</span></div>
    <div class="stats-grid">
      <div class="stat-card" onclick="goView('tasks')"><div class="stat-label">Otwarte zadania</div><div class="stat-val">${openTasks}</div><div class="stat-sub">→ Do zadań</div></div>
      <div class="stat-card" onclick="goView('roadmap')"><div class="stat-label">W toku</div><div class="stat-val">${inProgress}</div><div class="stat-sub">→ Roadmapa</div></div>
      <div class="stat-card" onclick="goView('notes')"><div class="stat-label">Notatki</div><div class="stat-val">${totalNotes}</div><div class="stat-sub">→ Notatki</div></div>
      <div class="stat-card" onclick="goView('meetings')"><div class="stat-label">Spotkania</div><div class="stat-val">${S.meetings.length}</div><div class="stat-sub">→ Spotkania</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div class="td-sec-title" style="margin-bottom:10px">Postęp zadań</div>
        <div style="background:var(--bg1);border-radius:var(--r12);padding:14px 16px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px"><span>${doneTasks} ukończone</span><span style="color:var(--t3)">${totalTasks} łącznie</span></div>
          <div style="background:var(--b3);border-radius:4px;height:8px;overflow:hidden"><div style="height:100%;background:var(--acc);border-radius:4px;width:${totalTasks?Math.round(doneTasks/totalTasks*100):0}%;transition:width .5s"></div></div>
          <div style="margin-top:8px;font-size:11px;color:var(--t3)">${totalTasks?Math.round(doneTasks/totalTasks*100):0}% ukończone</div>
        </div>
        <div class="td-sec-title" style="margin:16px 0 10px">Projekty</div>
        ${S.projects.map(p=>{
          const pitems=S.items.filter(i=>i.pid===p.id);
          const pt=pitems.reduce((a,i)=>a+i.tasks.length,0);
          const pd=pitems.reduce((a,i)=>a+i.tasks.filter(t=>t.done).length,0);
          return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--b3)">
            <div style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0"></div>
            <div style="flex:1;font-size:13px;font-weight:500">${p.name}</div>
            <div style="font-size:11px;color:var(--t3)">${pd}/${pt}</div>
            <div style="width:60px;background:var(--b3);border-radius:4px;height:5px"><div style="height:100%;background:${p.color};border-radius:4px;width:${pt?Math.round(pd/pt*100):0}%"></div></div>
          </div>`;}).join('')}
      </div>
      <div>
        <div class="td-sec-title" style="margin-bottom:10px">Ostatnie taski z roadmapy</div>
        ${recentItems.map(item=>{
          const proj=S.projects.find(p=>p.id===item.pid);
          return`<div style="background:var(--bg0);border:.5px solid var(--b3);border-radius:var(--r8);padding:10px 13px;margin-bottom:6px;cursor:pointer" onclick="goDetail('task-detail',{id:'${item.id}',name:'${item.name.replace(/'/g,"\\'")}' })">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px">
              <div style="width:7px;height:7px;border-radius:50%;background:${proj?proj.color:'var(--acc)'}"></div>
              <span style="font-weight:600;font-size:13px;flex:1">${item.name}</span>
              <span class="pill ${SC[item.status]}">${SL[item.status]}</span>
            </div>
            <div style="font-size:11px;color:var(--t3)">${proj?proj.name:''} · ${item.q}</div>
          </div>`;}).join('')}
        <div class="td-sec-title" style="margin:16px 0 10px">Nadchodzące spotkania</div>
        ${S.meetings.slice(0,3).map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--b3);cursor:pointer" onclick="goDetail('meeting-detail',{id:'${m.id}',title:'${m.title.replace(/'/g,"\\'")}' })">
          <div style="flex-shrink:0;text-align:center;background:var(--bg1);border-radius:6px;padding:4px 8px"><div style="font-size:10px;color:var(--t3)">${m.date.split(' ').slice(0,2).join(' ')}</div><div style="font-size:12px;font-weight:700;font-family:var(--mono)">${m.time}</div></div>
          <div style="flex:1"><div style="font-size:13px;font-weight:500">${m.title}</div></div>
        </div>`).join('')}
      </div>
    </div>`;
}

// ───────────────────────── PROJECTS VIEW ─────────────────────────
function renderProjectsView(c){
  c.innerHTML=`<div class="view-header"><div class="view-title">Projekty</div><button class="btn pri xs" onclick="openAddProject()">+ Projekt</button></div>
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px">
      ${S.projects.map(p=>{
        const pitems=S.items.filter(i=>i.pid===p.id);
        const pt=pitems.reduce((a,i)=>a+i.tasks.length,0);
        const pd=pitems.reduce((a,i)=>a+i.tasks.filter(t=>t.done).length,0);
        return`<div style="background:var(--bg0);border:.5px solid var(--b3);border-radius:var(--r16);padding:18px;cursor:pointer;transition:border-color .15s" onmouseover="this.style.borderColor='var(--b2)'" onmouseout="this.style.borderColor='var(--b3)'">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="width:36px;height:36px;border-radius:10px;background:${p.color}20;display:flex;align-items:center;justify-content:center">
              <div style="width:12px;height:12px;border-radius:50%;background:${p.color}"></div>
            </div>
            <button class="btn xs danger" onclick="event.stopPropagation();deleteProject('${p.id}')">✕ Usuń</button>
          </div>
          <div style="font-weight:700;font-size:15px;margin-bottom:4px">${p.name}</div>
          <div style="font-size:12px;color:var(--t3);margin-bottom:8px">${pitems.length} tasków · ${pt} zadań</div>
          ${p.engage!=null?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <div style="flex:1;height:4px;background:var(--b3);border-radius:2px"><div style="height:100%;background:${p.color};border-radius:2px;width:${p.engage}%"></div></div>
            <span style="font-size:11px;font-weight:600;color:${p.color};flex-shrink:0">${p.engage}% zaangażowania</span>
          </div>`:''}
          <div style="background:var(--b3);border-radius:4px;height:5px;overflow:hidden"><div style="height:100%;background:${p.color};border-radius:4px;width:${pt?Math.round(pd/pt*100):0}%"></div></div>
          <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--t3)"><span>${pd}/${pt} zadań</span><span onclick="event.stopPropagation();S.curProj='${p.id}';goView('roadmap')" style="color:var(--acc);cursor:pointer">→ Roadmapa</span></div>
        </div>`;}).join('')}
    </div>`;
}
function deleteProject(pid){
  if(!confirm('Usunąć projekt i wszystkie jego taski?'))return;
  S.projects=S.projects.filter(p=>p.id!==pid);
  S.items=S.items.filter(i=>i.pid!==pid);
  if(S.curProj===pid)S.curProj=S.projects[0]?.id||'';
  persist();renderProjectsView($('content'));
}

// ───────────────────────── TASKS VIEW ─────────────────────────
function renderTasks(c){
  updateBadges();
  const all=S.items.flatMap(item=>item.tasks.map(t=>({...t,item,proj:S.projects.find(p=>p.id===item.pid)})));
  const filters=[['all','Wszystkie'],['open','Otwarte'],['done','Ukończone']];
  const filtered=all.filter(t=>S.taskFilter==='all'?true:S.taskFilter==='open'?!t.done:t.done);
  const groups={};filtered.forEach(t=>{const k=t.proj?.id||'other';if(!groups[k])groups[k]=[];groups[k].push(t);});
  c.innerHTML=`<div class="view-header"><div class="view-title">Zadania</div><button class="btn pri xs" onclick="openAddGlobalTask()">+ Zadanie</button></div>
    <div class="task-filter">
      ${filters.map(([v,l])=>`<div class="tfil ${S.taskFilter===v?'act':''}" onclick="S.taskFilter='${v}';renderTasks($('content'))">${l}</div>`).join('')}
    </div>
    ${Object.entries(groups).map(([pid,tasks])=>{
      const proj=S.projects.find(p=>p.id===pid);
      return`<div class="task-group">
        <div class="task-group-hd"><span style="display:flex;align-items:center;gap:7px"><span style="width:7px;height:7px;border-radius:50%;background:${proj?proj.color:'var(--t3)'};display:inline-block"></span>${proj?proj.name:'Inne'}</span><span>${tasks.length}</span></div>
        ${tasks.map(t=>`<div class="task-item">
          <div class="cb ${t.done?'dn':''}" onclick="togGlobalTask('${t.id}','${t.item.id}')">${t.done?'✓':''}</div>
          <div style="flex:1">
            <div style="font-size:13px;${t.done?'text-decoration:line-through;color:var(--t3)':''}">${t.text}</div>
            <div class="task-meta">
              <span onclick="goDetail('task-detail',{id:'${t.item.id}',name:'${t.item.name.replace(/'/g,"\\'")}'})" style="color:var(--acc);cursor:pointer">${t.item.name}</span>
              ${t.due?`<span>· ${t.due}</span>`:''}
            </div>
          </div>
        </div>`).join('')}
      </div>`;}).join('')}

// ───────────────────────── NOTES VIEW ─────────────────────────
function renderNotes(c){
  function dateToQ(dateStr){
    const months={'stycznia':1,'lutego':2,'marca':3,'kwietnia':4,'maja':5,'czerwca':6,'lipca':7,'sierpnia':8,'wrzesnia':9,'pazdziernika':10,'listopada':11,'grudnia':12,'kwi':4,'mar':3,'lut':2,'sty':1,'maj':5,'cze':6,'lip':7,'sie':8,'wrz':9,'paz':10,'lis':11,'gru':12};
    const parts=dateStr.split(' ');if(parts.length<3)return'Inne';
    const rawM=parts[1]?parts[1].toLowerCase().replace(/\u0105/g,'a').replace(/\u0119/g,'e').replace(/\u017a/g,'z').replace(/\u017c/g,'z').replace(/\u00f3/g,'o').replace(/\u0107/g,'c').replace(/\u0142/g,'l').replace(/\u015b/g,'s').replace(/\u0144/g,'n'):'';
    const m=months[rawM]||null;
    const y=parseInt(parts[2]);
    if(!m||!y)return'Inne';
    return'Q'+Math.ceil(m/3)+' '+y;
  }
  function noteCard(n){
    const meet=n.meetingId?S.meetings.find(m=>m.id===n.meetingId):null;
    const item=n.itemId?S.items.find(i=>i.id===n.itemId):null;
    return`<div class="tl-note" onclick="goDetail('note-detail',{id:'${n.id}',title:'${n.title.replace(/'/g,"\\'")}' })">
      <div class="tl-note-title">${n.title}</div>
      <div class="tl-note-body">${n.bodyHtml?n.bodyHtml.replace(/<[^>]+>/g,'').slice(0,200):n.body}</div>
      <div class="tl-note-foot">
        <span style="font-size:10px;color:var(--t3)">${n.date}</span>
        ${meet?`<span class="tl-badge tl-meeting">&#9656; ${meet.title}</span>`:''}
        ${item?`<span class="tl-badge tl-roadmap">&#8594; ${item.name}</span>`:''}
        ${!meet&&!item?`<span class="tl-badge tl-free">&#9633; Luźna notatka</span>`:''}
        ${n.imgs&&n.imgs.length?`<span style="font-size:10px;color:var(--t3)">&#128247; ${n.imgs.length}</span>`:''}
      </div>
    </div>`;
  }
  const qGroups={};
  S.allNotes.forEach(n=>{const q=dateToQ(n.date);if(!qGroups[q])qGroups[q]=[];qGroups[q].push(n);});
  const qKeys=Object.keys(qGroups).filter(k=>k!=='Inne').sort((a,b)=>{
    const pa=a.split(' ');const pb=b.split(' ');
    const va=parseInt(pa[1])*10+parseInt(pa[0].slice(1));
    const vb=parseInt(pb[1])*10+parseInt(pb[0].slice(1));
    return vb-va;
  });
  if(qGroups['Inne'])qKeys.push('Inne');
  c.innerHTML=`<div class="view-header"><div class="view-title">Notatki</div><button class="btn pri xs" onclick="openAddNote()">+ Notatka</button></div>
    ${qKeys.map(q=>{
      const notes=qGroups[q];
      const qLabel=q==='Inne'?'?':q.split(' ')[0];
      const byDate={};
      notes.forEach(n=>{
        const parts=n.date.split(' ');
        const mk=parts.length>=3?parts[1]+' '+parts[2]:n.date;
        if(!byDate[mk])byDate[mk]=[];byDate[mk].push(n);
      });
      const dateKeys=Object.keys(byDate);
      return`<div style="margin-bottom:32px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:.5px solid var(--b3)">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:34px;height:34px;border-radius:9px;background:var(--acc-l);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--acc)">${qLabel}</div>
            <div>
              <div style="font-weight:700;font-size:15px">${q}</div>
              <div style="font-size:11px;color:var(--t3)">${notes.length} notat${notes.length===1?'ka':notes.length<5?'ki':'ek'}</div>
            </div>
          </div>
          <button class="btn xs" onclick="openAddNote()">+ Notatka</button>
        </div>
        <div style="padding-left:16px;border-left:1px solid var(--b3)">
          ${dateKeys.map(mk=>`<div style="margin-bottom:16px;position:relative">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
              <div style="width:10px;height:10px;border-radius:50%;background:var(--acc);border:2px solid var(--bg0);position:absolute;left:-21px;top:3px"></div>
              <span style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em">${mk}</span>
            </div>
            ${byDate[mk].map(n=>noteCard(n)).join('')}
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
    ${!qKeys.length?`<div class="empty">Brak notatek. Dodaj pierwszą!</div>`:''}`;
}

function delNImg(id,idx){const n=S.allNotes.find(x=>x.id===id);if(!n||!n.imgs)return;n.imgs.splice(idx,1);persist();const g=$('nd-imgs-'+id);if(g)g.innerHTML=n.imgs.map((img,i)=>`<div class="re-img-card"><img src="${img.dataUrl}" alt="${img.name}"><div class="re-img-del" onclick="delNImg('${id}',${i})">x</div></div>`).join('');}
function addNImgs(id,input){const n=S.allNotes.find(x=>x.id===id);if(!n)return;n.imgs=n.imgs||[];const files=Array.from(input.files);let p=files.length;files.forEach(f=>{const r=new FileReader();r.onload=e=>{n.imgs.push({name:f.name,dataUrl:e.target.result});persist();if(--p===0){const g=$('nd-imgs-'+id);if(g)g.innerHTML=n.imgs.map((img,i)=>`<div class="re-img-card"><img src="${img.dataUrl}" alt="${img.name}"><div class="re-img-del" onclick="delNImg('${id}',${i})">x</div></div>`).join('');}};r.readAsDataURL(f);});input.value='';}
async function pasteNClip(id){try{const items=await navigator.clipboard.read();for(const ci of items){for(const type of ci.types){if(type.startsWith('image/')){const blob=await ci.getType(type);const r=new FileReader();r.onload=e=>{const n=S.allNotes.find(x=>x.id===id);if(!n)return;n.imgs=n.imgs||[];n.imgs.push({name:'screenshot.png',dataUrl:e.target.result});persist();const g=$('nd-imgs-'+id);if(g)g.innerHTML=n.imgs.map((img,i)=>`<div class="re-img-card"><img src="${img.dataUrl}" alt="${img.name}"><div class="re-img-del" onclick="delNImg('${id}',${i})">x</div></div>`).join('');};r.readAsDataURL(blob);return;}}}alert('Brak obrazu w schowku.');}catch(e){alert('Sprobuj Ctrl+V w edytorze.');}}
function handleEditorPaste(e,id){const items=e.clipboardData?.items||[];for(const item of items){if(item.type.startsWith('image/')){e.preventDefault();const blob=item.getAsFile();const r=new FileReader();r.onload=ev=>{const n=S.allNotes.find(x=>x.id===id);if(!n)return;n.imgs=n.imgs||[];n.imgs.push({name:'screenshot.png',dataUrl:ev.target.result});persist();const g=$('nd-imgs-'+id);if(g)g.innerHTML=n.imgs.map((img,i)=>`<div class="re-img-card"><img src="${img.dataUrl}" alt="${img.name}"><div class="re-img-del" onclick="delNImg('${id}',${i})">x</div></div>`).join('');};r.readAsDataURL(blob);return;}}}
function viewImg(src){const ov=document.createElement('div');ov.className='re-img-full';ov.onclick=()=>ov.remove();const img=document.createElement('img');img.src=src;ov.appendChild(img);document.body.appendChild(ov);}

function deleteItem(id){
  const item=S.items.find(x=>x.id===id);if(!item)return;
  if(!confirm(`Czy na pewno chcesz usunąć task "${item.name}"? Tej operacji nie można cofnąć.`))return;
  S.items=S.items.filter(x=>x.id!==id);
  // also clean allNotes linked to this item
  S.allNotes=S.allNotes.map(n=>n.itemId===id?{...n,itemId:''}:n);
  persist();renderRoadmap($('content'));
}

// EDIT ITEM

  const statusOptions=Object.entries(SL).map(([val,lbl])=>`<option value="${val}" ${item.status===val?'selected':''}>${lbl}</option>`).join('');
  const quarterOptions=QUARTERS.map(q=>`<option value="${q}" ${item.q===q?'selected':''}>${q}</option>`).join('');
  const projectOptions=S.projects.map(p=>`<option value="${p.id}" ${item.pid===p.id?'selected':''}>${p.name}</option>`).join('');
  openMo('Edytuj task',`
    <div class="fg"><label class="fl">Projekt</label><select class="fs" id="mo-pid">${projectOptions}</select></div>
    <div class="fg"><label class="fl">Nazwa taska</label><input class="fi" id="mo-name" value="${item.name.replace(/"/g,'&quot;')}"></div>
    <div class="fg"><label class="fl">Kwartał</label><select class="fs" id="mo-q">${quarterOptions}</select></div>

      <div style="display:flex;gap:8px;align-items:center">

function taskRowHTML(t,iid){return`<div class="task-row"><div class="cb ${t.done?'dn':''}" onclick="togTask('${t.id}','${iid}')">${t.done?'✓':''}</div><span style="flex:1;font-size:13px;line-height:1.4;${t.done?'text-decoration:line-through;color:var(--t3)':''}">${t.text}</span><span style="font-size:11px;color:var(--t3)">${t.due||''}</span></div>`;}
function noteChipHTML(n,iid){
  return`<div class="note-chip" onclick="goDetail('note-detail',{id:'${n.id}',title:'${n.title.replace(/'/g,"\\'")}' })">
    <div class="note-chip-title">${n.title}</div>
    <div class="note-chip-body">${n.body}</div>
    <div style="font-size:10px;color:var(--t3);margin-top:3px">${n.date}</div>
  </div>`;
}
function attChipHTML(a,onDelFn){
  const typeMap={img:'ai-img',png:'ai-img',jpg:'ai-img',pdf:'ai-pdf',fig:'ai-fig',figma:'ai-fig',link:'ai-link',file:'ai-file'};
  const labelMap={img:'IMG',png:'IMG',jpg:'IMG',pdf:'PDF',fig:'FIG',figma:'FIG',link:'↗',file:'DOC'};
  const ic=typeMap[a.type]||'ai-file',lb=labelMap[a.type]||'DOC';
  const del=onDelFn?`<span class="att-del" onclick="event.stopPropagation();${onDelFn}('${a.id}')">✕</span>`:'';
  if(a.dataUrl&&a.dataUrl.startsWith('data:image'))return`<div class="att-chip"><img src="${a.dataUrl}" style="width:22px;height:22px;border-radius:3px;object-fit:cover;flex-shrink:0"><span class="att-name">${a.name}</span>${del}</div>`;
  return`<div class="att-chip" ${a.url?`onclick="window.open('${a.url}','_blank')"`:''}><div class="att-icon ${ic}">${lb}</div><span class="att-name">${a.name}</span>${del}</div>`;
}
function attToolbar(id,ctx){return`<div class="att-toolbar">
  <button class="att-btn" onclick="$('att-fi-${id}-${ctx}').click()">📎 Plik</button>
  <button class="att-btn" onclick="$('att-img-${id}-${ctx}').click()">🖼 Obraz</button>
  <button class="att-btn" onclick="$('att-lf-${id}-${ctx}').style.display='flex'">🔗 Link</button>
</div>`;}

function toggleRM(id){S.expanded[id]=!S.expanded[id];renderRoadmap($('content'));}
function showInlineTaskForm(id){const f=$(`tf-${id}`);if(f){f.style.display='block';$(`ti-${id}`)?.focus();}}
function saveInlineTask(id){
  const txt=$(`ti-${id}`)?.value.trim(),due=$(`td-${id}`)?.value.trim();if(!txt)return;
  const item=S.items.find(x=>x.id===id);if(!item)return;
  item.tasks.push({id:uid(),text:txt,done:false,due:due||''});
  persist();updateBadges();S.expanded[id]=true;renderRoadmap($('content'));
}
function togTask(tid,iid){const item=S.items.find(x=>x.id===iid);if(!item)return;const t=item.tasks.find(x=>x.id===tid);if(t)t.done=!t.done;persist();updateBadges();const list=$(`tl-${iid}`);if(list)list.innerHTML=item.tasks.map(t=>taskRowHTML(t,iid)).join('')||`<div style="font-size:12px;color:var(--t3);padding:4px 0">Brak zadań.</div>`;}
function showInlineNoteForm(id){const f=$(`nf-${id}`);if(f){f.style.display='block';$(`nti-${id}`)?.focus();}}
function hideNoteForm(id){const f=$(`nf-${id}`);if(f)f.style.display='none';}
function saveInlineNote(id){
  const title=$(`nti-${id}`)?.value.trim(),body=$(`nta-${id}`)?.value.trim();if(!title)return;
  const item=S.items.find(x=>x.id===id);if(!item)return;
  const nid=uid();const now=new Date().toLocaleDateString('pl',{day:'numeric',month:'long',year:'numeric'});
  const note={id:nid,title,body:body||'',date:now,type:'roadmap',meetingId:'',atts:[]};
  item.notes.unshift(note);
  S.allNotes.unshift({...note,itemId:id});
  persist();S.expanded[id]=true;renderRoadmap($('content'));
}
function saveLinkToItem(id){
  const name=$(`att-ln-${id}-rm`)?.value.trim(),url=$(`att-lu-${id}-rm`)?.value.trim();if(!url)return;
  const item=S.items.find(x=>x.id===id);if(!item)return;
  item.atts.push({id:uid(),type:'link',name:name||url,url,dataUrl:''});
  $(`att-lf-${id}-rm`).style.display='none';persist();S.expanded[id]=true;renderRoadmap($('content'));
}
function handleItemFiles(id,input){
  const item=S.items.find(x=>x.id===id);if(!item)return;
  const files=Array.from(input.files);let p=files.length;
  files.forEach(f=>{const isImg=f.type.startsWith('image/');const att={id:uid(),type:isImg?'img':'file',name:f.name,dataUrl:'',url:''};
    if(isImg){const r=new FileReader();r.onload=e=>{att.dataUrl=e.target.result;item.atts.push(att);persist();if(--p===0){S.expanded[id]=true;renderRoadmap($('content'));}}; r.readAsDataURL(f);}
    else{item.atts.push(att);persist();if(--p===0){S.expanded[id]=true;renderRoadmap($('content'));}}});input.value='';
}
S.items.forEach(item=>{window[`delItemAtt_${item.id}`]=function(aid){item.atts=item.atts.filter(a=>a.id!==aid);persist();S.expanded[item.id]=true;renderRoadmap($('content'));};});

function deleteItemFromDetail(id){
  const item=S.items.find(x=>x.id===id);if(!item)return;
  if(!confirm(`Czy na pewno chcesz usunąć task "${item.name}"? Tej operacji nie można cofnąć.`))return;
  S.items=S.items.filter(x=>x.id!==id);
  S.allNotes=S.allNotes.map(n=>n.itemId===id?{...n,itemId:''}:n);

function saveMo(){
  if(moMode==='proj'){
    const name=$('mo-pname')?.value.trim();if(!name)return;
    const engage=parseInt($('mo-engage')?.value)||50;
    const id=uid();S.projects.push({id,name,color:window._sc||'#5B4CF5',engage});S.curProj=id;persist();closeMo();
    if(S.curView==='roadmap')renderRoadmap($('content'));else goView('projects');
  }
  else if(moMode==='item'){
    const name=$('mo-name')?.value.trim();if(!name)return;
    const id=uid();
    const dlDay=parseInt($('mo-dl-day')?.value)||null;const dlMonth=parseInt($('mo-dl-month')?.value)||null;
    S.items.push({id,pid:$('mo-pid')?.value,q:$('mo-q')?.value,name,status:$('mo-s')?.value||'planning',
      deadlineDay:dlDay,deadlineMonth:dlMonth,
      poDesc:$('mo-po')?.value.trim()||'',myDesc:$('mo-my')?.value.trim()||'',kpis:[],tasks:[],notes:[],atts:[]});
    S.curProj=$('mo-pid')?.value;
    const item=S.items[S.items.length-1];
    window[`delItemAtt_${id}`]=function(aid){item.atts=item.atts.filter(a=>a.id!==aid);persist();S.expanded[id]=true;renderRoadmap($('content'));};
    persist();closeMo();renderRoadmap($('content'));
  }
  else if(moMode==='item-edit'){
    const id=moExtra.id;
    const item=S.items.find(x=>x.id===id);if(!item)return;
    const name=$('mo-name')?.value.trim();if(!name)return;
    const prevExpanded=S.expanded[id];
    item.pid=$('mo-pid')?.value||item.pid;
    item.name=name;
    item.q=$('mo-q')?.value||item.q;
    item.status=$('mo-s')?.value||item.status;
    item.deadlineDay=parseInt($('mo-dl-day')?.value)||null;
    item.deadlineMonth=parseInt($('mo-dl-month')?.value)||null;
    item.poDesc=$('mo-po')?.value.trim()||'';
    item.myDesc=$('mo-my')?.value.trim()||'';
    S.curProj=item.pid;
    S.expanded[id]=prevExpanded;
    persist();closeMo();
    // If we're in detail view, re-render it; otherwise go to roadmap
    if(S.curView==='roadmap'||!S.curView){renderRoadmap($('content'));}
    else{renderTaskDetail($('content'),id);}
  }
  else if(moMode==='note'){
    const title=$('mo-ntitle')?.value.trim();if(!title)return;
    const ed=$('mo-re-body');
    const bodyHtml=ed?ed.innerHTML:'';
    const body=ed?ed.innerText:'';
    const type=$('mo-ntype')?.value||'free';
    const meetingId=type==='meeting'?($('mo-nmid')?.value||''):'';
    const itemId=type==='roadmap'?($('mo-niid')?.value||''):'';
    const now=new Date().toLocaleDateString('pl',{day:'numeric',month:'long',year:'numeric'});
    const imgs=[...(window._notePendingImgs||[])];
    const nid=uid();
    const note={id:nid,title,body,bodyHtml,date:now,type,meetingId,itemId,atts:[],imgs};
    S.allNotes.unshift(note);
    if(itemId){const it=S.items.find(x=>x.id===itemId);if(it)it.notes.unshift({id:nid,title,body,bodyHtml,date:now,type,meetingId,atts:[],imgs:[]});}
    window._notePendingImgs=[];
    persist();closeMo();goView('notes');
  }
  else if(moMode==='note-edit'){
    // handled inline
  }
  else if(moMode==='meeting'){
    const title=$('mo-mtitle')?.value.trim();if(!title)return;
    S.meetings.push({id:uid(),title,date:$('mo-mdate')?.value.trim()||new Date().toLocaleDateString('pl'),time:$('mo-mtime')?.value.trim()||'',type:$('mo-mtype')?.value||'team',attendees:$('mo-matt')?.value.trim()||'',notes:$('mo-mnotes')?.value.trim()||''});
    persist();closeMo();renderMeetings($('content'));
  }
  else if(moMode==='task'){
    const txt=$('mo-ttxt')?.value.trim();if(!txt)return;
    const iid=$('mo-tiid')?.value;const item=S.items.find(x=>x.id===iid);if(!item)return;
    item.tasks.push({id:uid(),text:txt,done:false,due:$('mo-tdue')?.value.trim()||''});
    persist();updateBadges();closeMo();renderTasks($('content'));
  }
}


// ─── RICH EDITOR HELPERS ───
function richToolbarHTML(tid){
  const b=(cmd,lbl,tt)=>`<button class="re-btn" title="${tt}" onmousedown="event.preventDefault();execRE('${cmd}','${tid}')">${lbl}</button>`;
  const hb=(tag,lbl)=>`<button class="re-btn" title="${tag}" onmousedown="event.preventDefault();execREBlock('${tag}','${tid}')">${lbl}</button>`;
  return`<div class="re-toolbar">
    ${hb('h1','H1')}${hb('h2','H2')}${hb('h3','H3')}
    <div class="re-sep"></div>
    ${b('bold','<b>B</b>','Pogrubienie')}
    ${b('italic','<i>I</i>','Kursywa')}
    ${b('underline','<u>U</u>','Podkreslenie')}
    ${b('strikeThrough','<s>S</s>','Przekreslenie')}
    <div class="re-sep"></div>
    ${b('insertUnorderedList','&#8226; Lista','Lista punktowana')}
    ${b('insertOrderedList','1. Lista','Lista numerowana')}
    <button class="re-btn" title="Cytat" onmousedown="event.preventDefault();execREBlock('blockquote','${tid}')">&ldquo;&rdquo;</button>
    <button class="re-btn" title="Kod" onmousedown="event.preventDefault();wrapCode('${tid}')">{ }</button>
    <div class="re-sep"></div>
    <button class="re-btn" title="Link" onmousedown="event.preventDefault();insertLink('${tid}')">&#128279;</button>
    <button class="re-btn" title="Linia" onmousedown="event.preventDefault();document.execCommand('insertHorizontalRule')">&#8212;</button>
    <div class="re-sep"></div>
    <button class="re-btn" title="Cofnij" onmousedown="event.preventDefault();document.execCommand('undo')">&#8617;</button>
    <button class="re-btn" title="Ponow" onmousedown="event.preventDefault();document.execCommand('redo')">&#8618;</button>
  </div>`;
}
function initRE(id){const el=document.getElementById(id);if(!el)return;el.addEventListener('keydown',function(e){if(e.key==='Tab'){e.preventDefault();document.execCommand('insertHTML',false,'&nbsp;&nbsp;&nbsp;&nbsp;');}});}
function execRE(cmd,tid){const el=document.getElementById(tid);if(!el)return;el.focus();document.execCommand(cmd,false,null);}
function execREBlock(tag,tid){const el=document.getElementById(tid);if(!el)return;el.focus();document.execCommand('formatBlock',false,tag);}
function wrapCode(tid){const el=document.getElementById(tid);if(!el)return;el.focus();const sel=window.getSelection();if(sel&&sel.toString()){document.execCommand('insertHTML',false,`<code>${sel.toString()}</code>`);}else{document.execCommand('insertHTML',false,'<code>kod</code>');}}
function insertLink(tid){const el=document.getElementById(tid);if(!el)return;const url=prompt('URL linku:');if(!url)return;const label=window.getSelection()?.toString()||url;el.focus();document.execCommand('insertHTML',false,`<a href="${url}" target="_blank">${label}</a>`);}

// ───────────────────────── EXPORT / IMPORT ─────────────────────────
function exportData(){
  const data={projects:S.projects,items:S.items,meetings:S.meetings,allNotes:S.allNotes,curProj:S.curProj,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='designos-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.projects||!data.items){alert('Nieprawidlowy plik.');return;}
      if(!confirm('Importowac dane? Zastapi to obecne dane.'))return;
      S.projects=data.projects||[];S.items=data.items||[];
      S.meetings=data.meetings||[];S.allNotes=data.allNotes||[];
      S.curProj=data.curProj||S.projects[0]?.id||'';
      S.items.forEach(item=>{window['delItemAtt_'+item.id]=function(aid){item.atts=item.atts.filter(a=>a.id!==aid);persist();S.expanded[item.id]=true;renderRoadmap($('content'));};});
      persist();updateBadges();goView('roadmap');
      alert('Dane zaimportowane!');
    }catch(err){alert('Blad: '+err.message);}
  };
  r.readAsText(file);input.value='';
}

// ───────────────────────── PASSWORD / LOCK ─────────────────────────
const PW_KEY = 'designos-pw';
const SESSION_KEY = 'designos-session';

function hashPin(str){
  let h = 0;
  for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}
  return h.toString(36);
}

function initLock(){
  const stored = localStorage.getItem(PW_KEY);
  const session = sessionStorage.getItem(SESSION_KEY);
  // No password set — enter directly
  if(!stored){
    unlock();
    return;
  }
  // Already authenticated this session
  if(session === stored){
    unlock();
    return;
  }
  // Show lock screen
  const ls = document.getElementById('lock-screen');
  ls.style.display = 'flex';
  setTimeout(()=>document.getElementById('lock-input')?.focus(), 150);
}

function tryUnlock(){
  const stored = localStorage.getItem(PW_KEY);
  const input = document.getElementById('lock-input')?.value || '';
  if(!input){document.getElementById('lock-err').textContent='Wpisz hasło.';return;}
  if(hashPin(input) === stored){
    sessionStorage.setItem(SESSION_KEY, stored);
    document.getElementById('lock-screen').style.display = 'none';
    unlock();
  } else {
    document.getElementById('lock-err').textContent = 'Nieprawidłowe hasło. Spróbuj jeszcze raz.';
    document.getElementById('lock-input').value = '';
    document.getElementById('lock-input').focus();
  }
}

function unlock(){
  document.getElementById('main-app').style.display = 'flex';
  if(typeof startApp==='function')startApp();
}

function emergencyReset(){
  // Just bypass lock entirely - remove password and enter
  localStorage.removeItem('designos-pw');
  sessionStorage.removeItem('designos-session');
  document.getElementById('lock-screen').style.display = 'none';
  unlock();
}

function showSetPassword(firstTime){
  document.getElementById('setpw-screen').style.display = 'flex';
  document.getElementById('pw-err').textContent = '';
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-rep').value = '';
  setTimeout(()=>document.getElementById('pw-new')?.focus(), 100);
  if(firstTime){
    document.querySelector('#setpw-screen [onclick="closeSetPassword()"]').style.display = 'none';
  } else {
    document.querySelector('#setpw-screen [onclick="closeSetPassword()"]').style.display = 'block';
  }
}

function closeSetPassword(){
  document.getElementById('setpw-screen').style.display = 'none';
}

function savePassword(){
  const pw = document.getElementById('pw-new')?.value || '';
  const rep = document.getElementById('pw-rep')?.value || '';
  const err = document.getElementById('pw-err');
  if(pw.length < 4){err.textContent = 'Hasło musi mieć minimum 4 znaki.';return;}
  if(pw !== rep){err.textContent = 'Hasła nie są identyczne.';return;}
  const hashed = hashPin(pw);
  localStorage.setItem(PW_KEY, hashed);
  sessionStorage.setItem(SESSION_KEY, hashed);
  document.getElementById('setpw-screen').style.display = 'none';
  document.getElementById('lock-screen').style.display = 'none';
  unlock();
  alert('✓ Hasło zostało zapisane!');
}

function showChangePassword(){
  const stored = localStorage.getItem(PW_KEY);
  if(stored){
    const cur = prompt('Podaj obecne hasło:');
    if(cur === null) return;
    if(hashPin(cur) !== stored){alert('Nieprawidłowe hasło.');return;}
  }
  showSetPassword(false);
}

function lockApp(){
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('lock-input').value = '';
  document.getElementById('lock-err').textContent = '';
  setTimeout(()=>document.getElementById('lock-input')?.focus(), 100);
}

// ───────────────────────── INIT ─────────────────────────
updateBadges();
function startApp(){goView('roadmap');}
initLock();
</script>
